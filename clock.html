<!DOCTYPE html>
<html>
  <head>
    <script>
      function startTime() {
        var today = new Date();
        var h = today.getHours();
        var m = today.getMinutes();
        m = checkTime(m);
        document.getElementById('txt').innerHTML = "It is " + h + ":" + m ;
        var t = setTimeout(startTime, 500);
      }
      function checkTime(i) {
        if (i < 10) {i = "0" + i};
        return i;
      }
    </script>
  </head>
  <body onload="startTime()">
    <center>
      <div id="txt"></div>
      <p id="demo"></p>
      <script>
        document.getElementById("demo").innerHTML = Date();
      </script>
    </center>
  </body>
</html>
